<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>수능 고난도 보카 랜덤 테스트 | Jenny Teacher</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
:root{
  --navy:#1c2b45; --navy-deep:#141f33;
  --brass:#b08d57; --brass-light:#d9bd8d;
  --oxblood:#8c2f3d;
  --bg:#f5f4f1; --card:#ffffff;
  --ink:#22262e; --sub:#8a8f99; --line:#e6e3dc;
  --ok:#1f7a54; --ok-bg:#e7f4ee;
  --no-bg:#faeceb;
  --r:14px;
  --shadow:0 2px 10px rgba(28,43,69,.06);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  background:var(--navy-deep); color:var(--ink);
  margin:0; padding:0; display:flex; justify-content:center; min-height:100vh;
}
.container{width:100%; max-width:500px; background:var(--bg); display:flex; flex-direction:column; min-height:100vh}
header{background:var(--navy); color:#fff; padding:18px 20px 15px; text-align:center; border-bottom:3px solid var(--brass)}
.header-eyebrow{font-size:.64rem; letter-spacing:.3em; color:var(--brass-light); text-transform:uppercase; margin-bottom:5px; font-weight:600}
header h1{margin:0; font-size:1.14rem; font-weight:800; letter-spacing:-.01em}
.content{padding:20px 18px 28px; flex-grow:1; display:flex; flex-direction:column}
.hidden{display:none!important}

/* 시작 화면 */
#start-screen{text-align:center; margin-top:24px}
.seal{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--card);border:1px solid var(--line);border-radius:100px;
  padding:8px 18px;margin-bottom:24px;box-shadow:var(--shadow);
  font-size:.74rem;font-weight:700;letter-spacing:.14em;color:var(--brass);
}
.seal::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--brass)}
#start-screen h2{font-size:1.55rem;font-weight:800;color:var(--navy);margin:0 0 12px;letter-spacing:-.02em;line-height:1.4}
#start-screen p{color:var(--sub);line-height:1.7;font-size:.9rem;margin-bottom:6px}
.start-meta{display:flex;justify-content:center;gap:8px;margin:22px 0 26px;flex-wrap:wrap}
.start-meta span{
  background:var(--card);border:1px solid var(--line);border-radius:100px;
  padding:8px 14px;font-size:.76rem;font-weight:600;color:var(--navy);
}

/* 버튼 */
.btn{
  background:var(--navy);color:#fff;border:none;padding:16px 20px;border-radius:var(--r);
  font-size:1rem;font-weight:700;cursor:pointer;width:100%;font-family:inherit;
  transition:transform .1s,background .2s;
}
.btn:hover{background:var(--navy-deep)}
.btn:active{transform:scale(.985)}
.btn:focus-visible{outline:3px solid var(--brass);outline-offset:2px}
.btn-oxblood{background:var(--oxblood);margin-top:10px}
.btn-oxblood:hover{background:#742531}
.btn-ghost{background:var(--card);color:var(--sub);border:1px solid var(--line);margin-top:10px;font-weight:600}
.btn-ghost:hover{background:#efede8}

/* 퀴즈 화면 */
.file-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.stat-chips{display:flex;gap:6px}
.chip{
  background:var(--card);border:1px solid var(--line);border-radius:100px;
  padding:5px 12px;font-size:.72rem;font-weight:700;color:var(--navy);
}
.chip.fire{color:var(--oxblood);border-color:#efd9d6;background:var(--no-bg)}
.word-box{
  background:var(--card);border:1px solid var(--line);border-radius:var(--r);
  padding:34px 18px;margin-bottom:14px;text-align:center;box-shadow:var(--shadow);
}
.word-box .direction{
  display:inline-block;background:var(--bg);border-radius:100px;
  font-size:.7rem;letter-spacing:.1em;color:var(--brass);font-weight:700;
  padding:5px 13px;margin-bottom:16px;
}
.word-box .word{font-size:1.85rem;font-weight:800;color:var(--navy);line-height:1.35;letter-spacing:-.02em;word-break:keep-all}
.options{display:flex;flex-direction:column;gap:8px}
.option{
  background:var(--card);border:1px solid var(--line);padding:15px 16px;border-radius:12px;
  text-align:left;font-size:.94rem;line-height:1.5;cursor:pointer;font-family:inherit;color:var(--ink);
  font-weight:500;box-shadow:var(--shadow);
  transition:border-color .15s,transform .1s,background .15s;
}
.option:hover{border-color:var(--brass)}
.option:active{transform:scale(.99)}
.option:disabled{cursor:default}
.option.correct{background:var(--ok);color:#fff;border-color:var(--ok);font-weight:700}
.option.wrong{background:var(--oxblood);color:#fff;border-color:var(--oxblood);font-weight:700}
.option.dim{opacity:.4;box-shadow:none}
.option:focus-visible{outline:3px solid var(--brass);outline-offset:1px}
.judge{margin-top:14px;font-size:.88rem;line-height:1.6;text-align:center;font-weight:500;min-height:1.4em}
.judge .yes{color:var(--ok);font-weight:800}
.judge .no{color:var(--oxblood);font-weight:800}
.quiz-footer{display:flex;gap:8px;margin-top:14px}
.quiz-footer .btn{margin-top:0}

/* 오답노트 & 결과 */
.section-eyebrow{font-size:.66rem;letter-spacing:.3em;color:var(--brass);font-weight:700;margin:6px 0 16px;text-transform:uppercase;text-align:center}
.report{background:var(--card);border:1px solid var(--line);border-radius:var(--r);margin-bottom:16px;text-align:left;overflow:hidden;box-shadow:var(--shadow)}
.report .head{background:var(--navy);color:#fff;font-size:.72rem;letter-spacing:.16em;font-weight:700;padding:10px 16px;text-transform:uppercase;display:flex;justify-content:space-between}
.rrow{padding:13px 16px;border-top:1px solid var(--line);font-size:.9rem;line-height:1.55}
.rrow:first-of-type{border-top:none}
.rrow .w{font-weight:800;color:var(--navy)}
.rrow .m{color:var(--sub)}
.rrow .cnt{float:right;font-size:.7rem;font-weight:800;color:var(--oxblood);background:var(--no-bg);border-radius:100px;padding:3px 10px}
.empty-note{padding:28px 16px;text-align:center;color:var(--sub);font-size:.86rem;line-height:1.7}
.score-line{display:flex;justify-content:center;gap:10px;margin:4px 0 18px}
.score-line div{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px 0;flex:1;text-align:center;box-shadow:var(--shadow)}
.score-line .n{font-size:1.7rem;font-weight:800;color:var(--navy);line-height:1.2;letter-spacing:-.02em}
.score-line .l{font-size:.68rem;letter-spacing:.16em;color:var(--brass);font-weight:700;text-transform:uppercase;margin-top:3px}
.credit{margin-top:auto;padding-top:24px;text-align:center;font-size:.74rem;color:var(--sub)}
.credit a{color:var(--oxblood);font-weight:700;text-decoration:none}
@media (prefers-reduced-motion:no-preference){
  .screen-in{animation:fadeUp .28s ease}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .option.correct{animation:pop .25s ease}
  @keyframes pop{50%{transform:scale(1.02)}}
}
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="header-eyebrow">Vocabulary · Random Drill</div>
    <h1>수능 고난도 보카 테스트</h1>
  </header>

  <div class="content">

    <!-- 시작 화면 -->
    <div id="start-screen" class="screen-in">
      <div class="seal">JENNY TEACHER</div>
      <h2>이 단어, 시험장에서<br>0.5초 안에 나올까?</h2>
      <p>수능·평가원 고난도 어휘를 무작위로 출제합니다.<br>풀 때마다 새로운 문제 — 끝은 없습니다.</p>
      <div class="start-meta">
        <span>♾️ 무한 랜덤</span><span>🔁 영↔한 양방향</span><span>📒 오답노트 저장</span>
      </div>
      <button class="btn" onclick="startQuiz()">테스트 시작하기</button>
      <button class="btn btn-ghost" onclick="showNote()">내 오답노트 보기 (<span id="note-count-start">0</span>)</button>
    </div>

    <!-- 퀴즈 화면 -->
    <div id="quiz-screen" class="hidden">
      <div class="file-bar">
        <span class="chip" id="progress">Q 1</span>
        <div class="stat-chips">
          <span class="chip" id="acc-chip">정답률 —</span>
          <span class="chip fire hidden" id="streak"></span>
        </div>
      </div>
      <div class="word-box">
        <div class="direction" id="direction">알맞은 뜻 고르기</div>
        <div class="word" id="word-display">word</div>
      </div>
      <div class="options" id="options-container"></div>
      <div class="judge" id="judge"></div>
      <div class="quiz-footer">
        <button class="btn hidden" id="next-btn" onclick="nextQuestion()">다음 문제</button>
        <button class="btn btn-ghost hidden" id="finish-btn" onclick="showResult()" style="max-width:120px">그만 풀기</button>
      </div>
    </div>

    <!-- 결과 화면 -->
    <div id="result-screen" class="hidden">
      <div class="section-eyebrow">Session Report</div>
      <div class="score-line">
        <div><div class="n" id="r-total">0</div><div class="l">문제</div></div>
        <div><div class="n" id="r-correct">0</div><div class="l">정답</div></div>
        <div><div class="n" id="r-acc">0%</div><div class="l">정답률</div></div>
      </div>
      <div class="report">
        <div class="head"><span>이번 세션 오답</span></div>
        <div id="session-wrong-rows"></div>
      </div>
      <button class="btn" onclick="restartQuiz()">다시 도전하기</button>
      <button class="btn btn-oxblood" onclick="showNote()">누적 오답노트 보기</button>
      <button class="btn btn-ghost" onclick="goHome()">처음으로</button>
    </div>

    <!-- 오답노트 화면 -->
    <div id="note-screen" class="hidden">
      <div class="section-eyebrow">Wrong Answer Note</div>
      <div class="report">
        <div class="head"><span>누적 오답노트</span><span id="note-total"></span></div>
        <div id="note-rows"></div>
      </div>
      <button class="btn" onclick="startQuiz()">이 상태로 다시 풀기</button>
      <button class="btn btn-ghost" onclick="clearNote()">오답노트 비우기</button>
      <button class="btn btn-ghost" onclick="goHome()">처음으로</button>
    </div>

    <div class="credit">
      made by <a href="https://instagram.com/thelogic_engtutor" target="_blank" rel="noopener">@thelogic_engtutor</a> · 1:1 수능영어 정밀 코칭
    </div>
  </div>
</div>

["equivalent","~에 상응하는 (것)"],["analogous","~와 유사한"],["identical","완전히 동일한"],
["hypothetical","가설상의, 가정의"],["empirical","경험·실험에 근거한"],["theoretical","이론상의"],
["pragmatic","실용적인, 현실적인"],["feasible","실행 가능한"],["viable","성공·존속 가능한"],
["futile","헛된, 소용없는"],["vain","헛된; 허영심 있는"],["trivial","사소한, 하찮은"],
["profoundly","깊이, 극심하게"],["notorious","악명 높은"],["renowned","명성 있는"],
["eminent","(분야에서) 저명한"],["obstinate","고집 센"],["reluctant","꺼리는, 마지못한"],
["compulsory","의무적인, 강제의"],["voluntary","자발적인"],["deficient","(필수 요소가) 부족한"],
["proficient","능숙한"],["adept","(기술에) 정통한"],["inept","서투른, 부적절한"],
["hostile","적대적인"],["benign","온화한; (종양이) 양성의"],["malicious","악의적인"],
["altruistic","이타적인"],["egocentric","자기중심적인"],["skeptical","회의적인"],
["cynical","냉소적인"],["optimal","최적의"],["optimum","최적 조건(의)"],
["paradoxical","역설적인"],["ironic","반어적인, 아이러니한"],["ubiquitous","어디에나 있는"]
];

/* ── 저장소 (localStorage + 인메모리 폴백) ── */
const NOTE_KEY = 'jt_voca_wrong_note_v1';
let memoryNote = {};
function loadNote(){
  try{ return JSON.parse(localStorage.getItem(NOTE_KEY)) || {}; }
  catch(e){ return memoryNote; }
}
function saveNote(note){
  try{ localStorage.setItem(NOTE_KEY, JSON.stringify(note)); }
  catch(e){ memoryNote = note; }
}

/* ── 상태 ── */
let qCount = 0, correctCount = 0, streak = 0, bestStreak = 0;
let current = null;
let sessionWrong = [];
let recentIdx = [];

const $ = id => document.getElementById(id);
const screens = ['start-screen','quiz-screen','result-screen','note-screen'];
function show(id){
  screens.forEach(s => $(s).classList.add('hidden'));
  $(id).classList.remove('hidden');
  $(id).classList.add('screen-in');
  window.scrollTo(0,0);
}

/* ── 문제 생성 ── */
function pickIndex(){
  let i;
  do { i = Math.floor(Math.random()*BANK.length); } while (recentIdx.includes(i));
  recentIdx.push(i);
  if (recentIdx.length > 10) recentIdx.shift();
  return i;
}
function tokens(s){ return s.replace(/[()~;,·]/g,' ').split(/\s+/).filter(t=>t.length>=2); }
function overlaps(a,b){
  const ta = tokens(a), tb = tokens(b);
  return ta.some(t => tb.includes(t));
}
function makeQuestion(){
  const idx = pickIndex();
  const [word, meaning] = BANK[idx];
  const dir = Math.random() < 0.6 ? 'e2k' : 'k2e';
  const answerText = dir === 'e2k' ? meaning : word;

  const pool = BANK.filter((e,i) => i !== idx);
  const distractors = [];
  const used = new Set();
  while (distractors.length < 3 && used.size < pool.length){
    const j = Math.floor(Math.random()*pool.length);
    if (used.has(j)) continue;
    used.add(j);
    const cand = dir === 'e2k' ? pool[j][1] : pool[j][0];
    if (dir === 'e2k' && overlaps(cand, meaning)) continue;
    if (!distractors.includes(cand)) distractors.push(cand);
  }
  const options = [...distractors, answerText].sort(() => Math.random() - .5);
  return { word, meaning, dir, options, answerText };
}

/* ── 화면 흐름 ── */
function startQuiz(){
  qCount = 0; correctCount = 0; streak = 0; bestStreak = 0;
  sessionWrong = [];
  show('quiz-screen');
  nextQuestion();
}
function restartQuiz(){ startQuiz(); }
function goHome(){
  updateStartNoteCount();
  show('start-screen');
}

function updateChips(){
  $('progress').innerText = `Q ${qCount}`;
  const answered = qCount - 1;
  $('acc-chip').innerText = answered > 0 ? `정답률 ${Math.round(correctCount/answered*100)}%` : '정답률 —';
  if (streak >= 2){
    $('streak').classList.remove('hidden');
    $('streak').innerText = `🔥 ${streak}연속`;
  } else {
    $('streak').classList.add('hidden');
  }
}

function nextQuestion(){
  current = makeQuestion();
  qCount++;
  updateChips();
  $('direction').innerText = current.dir === 'e2k' ? '알맞은 뜻 고르기' : '알맞은 단어 고르기';
  $('word-display').innerText = current.dir === 'e2k' ? current.word : current.meaning;
  $('judge').innerHTML = '';
  $('next-btn').classList.add('hidden');
  $('finish-btn').classList.add('hidden');

  const box = $('options-container');
  box.innerHTML = '';
  current.options.forEach(opt => {
    const b = document.createElement('button');
    b.className = 'option';
    b.innerText = opt;
    b.onclick = () => answer(b, opt);
    box.appendChild(b);
  });
}

function answer(btn, chosen){
  const buttons = $('options-container').querySelectorAll('.option');
  buttons.forEach(b => { b.disabled = true; if (b !== btn) b.classList.add('dim'); });

  const isCorrect = chosen === current.answerText;
  if (isCorrect){
    correctCount++; streak++;
    bestStreak = Math.max(bestStreak, streak);
    btn.classList.remove('dim'); btn.classList.add('correct');
    $('judge').innerHTML = `<span class="yes">정답!</span> ${current.word} — ${current.meaning}`;
  } else {
    streak = 0;
    btn.classList.remove('dim'); btn.classList.add('wrong');
    buttons.forEach(b => { if (b.innerText === current.answerText){ b.classList.remove('dim'); b.classList.add('correct'); } });
    $('judge').innerHTML = `<span class="no">오답.</span> 정답: <b>${current.word} — ${current.meaning}</b> <span style="color:#8a8f99">(오답노트 저장됨)</span>`;
    recordWrong(current.word, current.meaning);
    sessionWrong.push({word: current.word, meaning: current.meaning});
  }
  updateChips();
  $('next-btn').classList.remove('hidden');
  $('finish-btn').classList.remove('hidden');
}

function recordWrong(word, meaning){
  const note = loadNote();
  if (!note[word]) note[word] = { meaning, count: 0, last: '' };
  note[word].count++;
  note[word].last = new Date().toISOString().slice(0,10);
  saveNote(note);
}

/* ── 결과 화면 ── */
function showResult(){
  $('r-total').innerText = qCount;
  $('r-correct').innerText = correctCount;
  $('r-acc').innerText = qCount ? Math.round(correctCount/qCount*100) + '%' : '0%';

  const rows = $('session-wrong-rows');
  rows.innerHTML = '';
  if (sessionWrong.length === 0){
    rows.innerHTML = `<div class="empty-note">이번 세션 오답 없음 — 완벽했어요. 🎯</div>`;
  } else {
    const seen = new Set();
    sessionWrong.forEach(w => {
      if (seen.has(w.word)) return;
      seen.add(w.word);
      rows.insertAdjacentHTML('beforeend',
        `<div class="rrow"><span class="w">${w.word}</span> <span class="m">— ${w.meaning}</span></div>`);
    });
  }
  show('result-screen');
}

/* ── 오답노트 화면 ── */
function showNote(){
  const note = loadNote();
  const entries = Object.entries(note).sort((a,b) => b[1].count - a[1].count);
  $('note-total').innerText = entries.length + '개';
  const rows = $('note-rows');
  rows.innerHTML = '';
  if (entries.length === 0){
    rows.innerHTML = `<div class="empty-note">아직 저장된 오답이 없습니다.<br>테스트를 풀면 틀린 단어가 자동으로 쌓여요.</div>`;
  } else {
    entries.forEach(([word, d]) => {
      rows.insertAdjacentHTML('beforeend',
        `<div class="rrow"><span class="cnt">${d.count}회</span><span class="w">${word}</span> <span class="m">— ${d.meaning}</span></div>`);
    });
  }
  show('note-screen');
}
function clearNote(){
  if (!confirm('누적 오답노트를 모두 삭제할까요?')) return;
  saveNote({});
  showNote();
}
function updateStartNoteCount(){
  $('note-count-start').innerText = Object.keys(loadNote()).length;
}
updateStartNoteCount();
</script>
